<!DOCTYPE html>
<html>
<head>
<style>
.nice-button {
	background-color: rgb(66, 133, 244);
	color: white;
	border: none;
	border-radius: 10px;
	padding: 12px 20px;
	font-size: 16px;
	font-weight: 600;
	cursor: pointer;
	box-shadow: 0 6px 14px rgba(66, 133, 244, 0.35);
	transition: background-color 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
}

.nice-button:hover {
	background-color: rgb(53, 112, 217);
	box-shadow: 0 8px 18px rgba(53, 112, 217, 0.42);
}

.nice-button:active {
	transform: translateY(2px);
}
</style>
</head>
<body>

<h1>HTML Buttons</h1>

<p>The button uses the <code>onclick</code> attribute to run JavaScript. When you click the button, it shows an alert message.</p>

<button class="nice-button" onclick="alert('Hello!')">Click Me</button>

</body>
</html>
