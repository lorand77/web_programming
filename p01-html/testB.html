<!DOCTYPE html>
<html>
<head>
<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, rgb(255, 245, 242), rgb(245, 250, 255));
  color: rgb(40, 40, 40);
}

.page {
  max-width: 900px;
  margin: 0 auto;
  padding: 40px 20px;
}

h1 {
  margin: 0 0 24px;
  font-size: 36px;
  text-align: center;
  color: rgb(66, 41, 41);
}

.city {
  background-color: rgb(255, 255, 255);
  color: rgb(0, 0, 0);
  border: 1px solid rgb(240, 220, 220);
  border-radius: 14px;
  margin: 16px 0;
  padding: 22px;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.city:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
}

.city h2 {
  margin: 0 0 8px;
  color: rgb(170, 76, 76);
}

.city p {
  margin: 0;
  line-height: 1.5;
}
</style>
</head>
<body>

<main class="page">
  <h1>Famous Cities</h1>

<div class="city">
  <h2>London</h2>
  <p>London is the capital of England.</p>
</div>

<div class="city">
  <h2>Paris</h2>
  <p>Paris is the capital of France.</p>
</div>

<div class="city">
  <h2>Tokyo</h2>
  <p>Tokyo is the capital of Japan.</p>
</div>

</main>

</body>
</html>
